<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>복싱장 회원관리</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242836;
      --border: #2e3348;
      --text: #e8eaef;
      --text-muted: #8b92a8;
      --accent: #e63946;
      --accent-hover: #c1121f;
      --success: #2dc653;
      --warning: #f4a261;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,.35);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .app {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header h1 span { color: var(--accent); }

    header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }

    .stat-card .value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-card .label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .panel h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel h2::before {
      content: '';
      width: 4px;
      height: 16px;
      background: var(--accent);
      border-radius: 2px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 120px auto;
      gap: 10px;
      align-items: end;
    }

    .form-grid .form-full {
      grid-column: 1 / -1;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }

    .field textarea {
      resize: vertical;
      min-height: 60px;
    }

    .field input:focus,
    .field textarea:focus { border-color: var(--accent); }

    .search-bar {
      position: relative;
      margin-bottom: 16px;
    }

    .search-bar input {
      width: 100%;
      padding: 12px 16px 12px 40px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
    }

    .search-bar input:focus { border-color: var(--accent); }

    .search-bar svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 18px;
      height: 18px;
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-success {
      background: var(--success);
      color: #fff;
    }

    .btn-success:hover { background: #1fa040; }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .btn-danger {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 6px 12px;
      font-size: 0.75rem;
    }

    .btn-danger:hover { background: rgba(230,57,70,.15); }

    .btn-sm {
      padding: 6px 12px;
      font-size: 0.75rem;
    }

    .backup-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .member-list { display: flex; flex-direction: column; gap: 10px; }

    .member-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      transition: border-color .15s;
    }

    .member-card:hover { border-color: #3d4460; }

    .member-card.absent {
      border-color: var(--accent);
      background: rgba(230, 57, 70, 0.08);
    }

    .member-card.absent .member-info h3,
    .member-card.absent .last-visit {
      color: var(--accent);
    }

    .member-info h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .member-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .member-meta span { display: flex; align-items: center; gap: 4px; }

    .last-visit.absent-text { color: var(--accent); font-weight: 600; }

    .member-memo {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.2);
      padding: 6px 10px;
      border-radius: 6px;
      border-left: 3px solid var(--border);
    }

    .pt-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(230,57,70,.15);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.8rem;
    }

    .pt-badge.low {
      background: rgba(244,162,97,.15);
      color: var(--warning);
    }

    .member-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
      opacity: .4;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 480px;
      max-height: 80vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 { font-size: 1rem; }

    .modal-body {
      padding: 16px 20px;
      overflow-y: auto;
      flex: 1;
    }

    .edit-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .edit-form .btn-primary { align-self: flex-end; }

    .attendance-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .attendance-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: var(--surface2);
      border-radius: 8px;
      font-size: 0.85rem;
    }

    .attendance-item .date { font-weight: 500; }

    .attendance-item .pt-tag {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .attendance-item .pt-tag.deducted { color: var(--accent); }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.85rem;
      z-index: 200;
      transition: transform .3s ease;
      box-shadow: var(--shadow);
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--success); }
    .toast.warning { border-color: var(--warning); }

    @media (max-width: 640px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .stats { grid-template-columns: 1fr; }

      .member-card {
        grid-template-columns: 1fr;
      }

      .member-actions {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🥊 <span>복싱장</span> 회원관리</h1>
      <p>회원 등록 · 출석 체크 · PT 관리</p>
    </header>

    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="value" id="statMembers">0</div>
        <div class="label">전체 회원</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statToday">0</div>
        <div class="label">오늘 출석</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statPt">0</div>
        <div class="label">총 PT 잔여</div>
      </div>
    </div>

    <div class="panel">
      <h2>회원 등록</h2>
      <form id="registerForm" class="form-grid">
        <div class="field">
          <label for="name">이름</label>
          <input type="text" id="name" placeholder="홍길동" required>
        </div>
        <div class="field">
          <label for="phone">연락처</label>
          <input type="tel" id="phone" placeholder="010-1234-5678" required>
        </div>
        <div class="field">
          <label for="ptCount">PT 횟수</label>
          <input type="number" id="ptCount" min="0" value="10" required>
        </div>
        <button type="submit" class="btn btn-primary">등록</button>
        <div class="field form-full">
          <label for="memo">메모 (선택)</label>
          <input type="text" id="memo" placeholder="특이사항, 메모...">
        </div>
      </form>
    </div>

    <div class="panel">
      <h2>회원 목록</h2>
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" id="searchInput" placeholder="이름, 연락처, 메모로 검색...">
      </div>
      <div class="member-list" id="memberList"></div>
    </div>

    <div class="panel">
      <h2>데이터 관리</h2>
      <div class="backup-actions">
        <button type="button" class="btn btn-ghost" onclick="exportData()">JSON 백업</button>
        <button type="button" class="btn btn-ghost" onclick="document.getElementById('importFile').click()">JSON 복원</button>
        <input type="file" id="importFile" accept=".json,application/json" hidden>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="attendanceModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">출석 기록</h3>
        <button class="btn btn-ghost btn-sm" id="closeModal">닫기</button>
      </div>
      <div class="modal-body">
        <div class="attendance-list" id="attendanceList"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="editModalTitle">회원 정보 수정</h3>
        <button class="btn btn-ghost btn-sm" id="closeEditModal">닫기</button>
      </div>
      <div class="modal-body">
        <form id="editForm" class="edit-form">
          <input type="hidden" id="editId">
          <div class="field">
            <label for="editName">이름</label>
            <input type="text" id="editName" required>
          </div>
          <div class="field">
            <label for="editPhone">연락처</label>
            <input type="tel" id="editPhone" required>
          </div>
          <div class="field">
            <label for="editPt">PT 잔여횟수</label>
            <input type="number" id="editPt" min="0" required>
          </div>
          <div class="field">
            <label for="editMemo">메모</label>
            <textarea id="editMemo" placeholder="특이사항, 메모..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary">저장</button>
        </form>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'boxing_gym_members';

    let members = loadMembers();
    let searchQuery = '';

    function loadMembers() {
      try {
        const raw = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        return migrateMembers(raw);
      } catch {
        return [];
      }
    }

    function migrateMembers(data) {
      return data.map(m => {
        const attendance = Array.isArray(m.attendance) ? m.attendance : [];
        let lastVisit = m.lastVisit || null;

        if (!lastVisit && attendance.length > 0) {
          const latest = attendance.reduce((a, b) =>
            new Date(a.date) > new Date(b.date) ? a : b
          );
          lastVisit = toDateOnly(latest.date);
        }

        return {
          id: m.id || generateId(),
          name: m.name || '',
          phone: m.phone || '',
          ptRemaining: typeof m.ptRemaining === 'number' ? m.ptRemaining : 0,
          memo: m.memo || '',
          lastVisit,
          createdAt: m.createdAt || new Date().toISOString(),
          attendance
        };
      });
    }

    function saveMembers() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(members));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function toDateOnly(iso) {
      const d = new Date(iso);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function getTodayDateOnly() {
      return toDateOnly(new Date().toISOString());
    }

    function formatPhone(value) {
      const digits = value.replace(/\D/g, '');
      if (digits.length <= 3) return digits;
      if (digits.length <= 7) return digits.slice(0, 3) + '-' + digits.slice(3);
      return digits.slice(0, 3) + '-' + digits.slice(3, 7) + '-' + digits.slice(7, 11);
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const h = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      return `${y}.${m}.${day} ${h}:${min}`;
    }

    function formatLastVisit(lastVisit) {
      if (!lastVisit) return '방문 없음';
      const [y, m, d] = lastVisit.split('-');
      return `${y}.${m}.${d}`;
    }

    function getDaysSinceLastVisit(member) {
      const reference = member.lastVisit
        ? new Date(member.lastVisit + 'T00:00:00')
        : new Date(member.createdAt);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      reference.setHours(0, 0, 0, 0);
      return Math.floor((today - reference) / 86400000);
    }

    function isAbsent(member) {
      return getDaysSinceLastVisit(member) >= 14;
    }

    function isToday(iso) {
      return toDateOnly(iso) === getTodayDateOnly();
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show ' + type;
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function updateStats() {
      const todayCount = members.reduce((sum, m) => {
        return sum + m.attendance.filter(a => isToday(a.date)).length;
      }, 0);
      const totalPt = members.reduce((sum, m) => sum + m.ptRemaining, 0);

      document.getElementById('statMembers').textContent = members.length;
      document.getElementById('statToday').textContent = todayCount;
      document.getElementById('statPt').textContent = totalPt;
    }

    function getFilteredMembers() {
      if (!searchQuery) return members;
      const q = searchQuery.toLowerCase();
      return members.filter(m =>
        m.name.toLowerCase().includes(q) ||
        m.phone.includes(q) ||
        (m.memo && m.memo.toLowerCase().includes(q))
      );
    }

    function renderMembers() {
      const list = document.getElementById('memberList');
      const filtered = getFilteredMembers();

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <p>${searchQuery ? '검색 결과가 없습니다.' : '등록된 회원이 없습니다.'}</p>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(m => {
        const absent = isAbsent(m);
        const ptClass = m.ptRemaining <= 3 ? 'low' : '';
        const todayChecked = m.attendance.some(a => isToday(a.date));
        const checkLabel = todayChecked ? '재출석' : '출석 체크';
        const daysSince = getDaysSinceLastVisit(m);
        const lastVisitText = formatLastVisit(m.lastVisit);
        const lastVisitLabel = m.lastVisit
          ? `마지막 방문: ${lastVisitText}`
          : `마지막 방문: 없음 (${daysSince}일)`;

        return `
          <div class="member-card${absent ? ' absent' : ''}" data-id="${m.id}">
            <div class="member-info">
              <h3>${escapeHtml(m.name)}</h3>
              <div class="member-meta">
                <span>📞 ${escapeHtml(m.phone)}</span>
                <span class="pt-badge ${ptClass}">PT ${m.ptRemaining}회</span>
                <span>출석 ${m.attendance.length}회</span>
                <span class="last-visit${absent ? ' absent-text' : ''}">${lastVisitLabel}${absent ? ' · 14일+ 미방문' : ''}</span>
              </div>
              ${m.memo ? `<div class="member-memo">📝 ${escapeHtml(m.memo)}</div>` : ''}
            </div>
            <div class="member-actions">
              <button class="btn btn-success btn-sm" onclick="checkIn('${m.id}')">${checkLabel}</button>
              <button class="btn btn-ghost btn-sm" onclick="showAttendance('${m.id}')">출석 기록</button>
              <button class="btn btn-ghost btn-sm" onclick="openEditModal('${m.id}')">수정</button>
              <button class="btn btn-danger btn-sm" onclick="deleteMember('${m.id}')">삭제</button>
            </div>
          </div>`;
      }).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function registerMember(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const ptCount = parseInt(document.getElementById('ptCount').value, 10);
      const memo = document.getElementById('memo').value.trim();

      if (!name || !phone) {
        showToast('이름과 연락처를 입력해주세요.', 'warning');
        return;
      }

      if (ptCount < 0 || isNaN(ptCount)) {
        showToast('PT 횟수를 올바르게 입력해주세요.', 'warning');
        return;
      }

      members.unshift({
        id: generateId(),
        name,
        phone,
        ptRemaining: ptCount,
        memo,
        lastVisit: null,
        createdAt: new Date().toISOString(),
        attendance: []
      });

      saveMembers();
      document.getElementById('registerForm').reset();
      document.getElementById('ptCount').value = '10';
      showToast(`${name} 회원이 등록되었습니다.`);
      updateStats();
      renderMembers();
    }

    function checkIn(id) {
      const member = members.find(m => m.id === id);
      if (!member) return;

      const ptDeducted = member.ptRemaining > 0;
      if (ptDeducted) {
        member.ptRemaining -= 1;
      }

      const today = getTodayDateOnly();
      member.lastVisit = today;

      member.attendance.unshift({
        date: new Date().toISOString(),
        visitDate: today,
        ptDeducted
      });

      saveMembers();

      if (ptDeducted) {
        showToast(`${member.name} 출석 완료! PT 1회 차감 (잔여 ${member.ptRemaining}회)`);
      } else {
        showToast(`${member.name} 출석 완료! PT 잔여 없음`, 'warning');
      }

      updateStats();
      renderMembers();
    }

    function showAttendance(id) {
      const member = members.find(m => m.id === id);
      if (!member) return;

      document.getElementById('modalTitle').textContent = `${member.name} — 출석 기록`;
      const list = document.getElementById('attendanceList');

      if (member.attendance.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>출석 기록이 없습니다.</p></div>';
      } else {
        list.innerHTML = member.attendance.map(a => {
          const visitDate = a.visitDate || toDateOnly(a.date);
          const [y, m, d] = visitDate.split('-');
          return `
            <div class="attendance-item">
              <span class="date">${y}.${m}.${d} ${formatDate(a.date).split(' ')[1] || ''}</span>
              <span class="pt-tag ${a.ptDeducted ? 'deducted' : ''}">
                ${a.ptDeducted ? 'PT 1회 차감' : 'PT 미차감'}
              </span>
            </div>`;
        }).join('');
      }

      document.getElementById('attendanceModal').classList.add('active');
    }

    function openEditModal(id) {
      const member = members.find(m => m.id === id);
      if (!member) return;

      document.getElementById('editId').value = member.id;
      document.getElementById('editName').value = member.name;
      document.getElementById('editPhone').value = member.phone;
      document.getElementById('editPt').value = member.ptRemaining;
      document.getElementById('editMemo').value = member.memo || '';
      document.getElementById('editModalTitle').textContent = `${member.name} — 정보 수정`;
      document.getElementById('editModal').classList.add('active');
    }

    function saveEditMember(e) {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const member = members.find(m => m.id === id);
      if (!member) return;

      const name = document.getElementById('editName').value.trim();
      const phone = document.getElementById('editPhone').value.trim();
      const ptRemaining = parseInt(document.getElementById('editPt').value, 10);
      const memo = document.getElementById('editMemo').value.trim();

      if (!name || !phone) {
        showToast('이름과 연락처를 입력해주세요.', 'warning');
        return;
      }

      if (ptRemaining < 0 || isNaN(ptRemaining)) {
        showToast('PT 잔여횟수를 올바르게 입력해주세요.', 'warning');
        return;
      }

      member.name = name;
      member.phone = phone;
      member.ptRemaining = ptRemaining;
      member.memo = memo;

      saveMembers();
      document.getElementById('editModal').classList.remove('active');
      showToast(`${name} 회원 정보가 수정되었습니다.`);
      updateStats();
      renderMembers();
    }

    function deleteMember(id) {
      const member = members.find(m => m.id === id);
      if (!member) return;
      if (!confirm(`${member.name} 회원을 삭제하시겠습니까?`)) return;

      members = members.filter(m => m.id !== id);
      saveMembers();
      showToast(`${member.name} 회원이 삭제되었습니다.`);
      updateStats();
      renderMembers();
    }

    function exportData() {
      const data = {
        exportedAt: new Date().toISOString(),
        members
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `boxing-gym-backup-${getTodayDateOnly()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('백업 파일이 다운로드되었습니다.');
    }

    function importData(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          const imported = Array.isArray(data) ? data : data.members;
          if (!Array.isArray(imported)) throw new Error('invalid format');

          if (!confirm(`기존 ${members.length}명 데이터를 ${imported.length}명 데이터로 교체하시겠습니까?`)) {
            return;
          }

          members = migrateMembers(imported);
          saveMembers();
          updateStats();
          renderMembers();
          showToast('데이터가 복원되었습니다.');
        } catch {
          showToast('올바른 JSON 파일이 아닙니다.', 'warning');
        }
      };
      reader.readAsText(file);
    }

    document.getElementById('registerForm').addEventListener('submit', registerMember);
    document.getElementById('editForm').addEventListener('submit', saveEditMember);

    document.getElementById('phone').addEventListener('input', (e) => {
      e.target.value = formatPhone(e.target.value);
    });

    document.getElementById('editPhone').addEventListener('input', (e) => {
      e.target.value = formatPhone(e.target.value);
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value.trim();
      renderMembers();
    });

    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('attendanceModal').classList.remove('active');
    });

    document.getElementById('closeEditModal').addEventListener('click', () => {
      document.getElementById('editModal').classList.remove('active');
    });

    document.getElementById('attendanceModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        e.currentTarget.classList.remove('active');
      }
    });

    document.getElementById('editModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        e.currentTarget.classList.remove('active');
      }
    });

    document.getElementById('importFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) importData(file);
      e.target.value = '';
    });

    updateStats();
    renderMembers();
  </script>
</body>
</html>
